<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are these two people friends?</title>
<meta property="og:title" content="Are these two people friends?">
<meta property="og:description" content="A simple yes/no question. Surely you can't get it wrong.">
<meta property="og:type" content="website">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #101418;
    color: #f4efe6;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  .kicker {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8b9199;
    margin-bottom: 18px;
  }

  h1 {
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 400;
    line-height: 1.15;
    max-width: 560px;
    margin-bottom: 34px;
  }

  .faces {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 38px;
  }

  .face {
    width: clamp(120px, 34vw, 170px);
    height: clamp(120px, 34vw, 170px);
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #f4efe6;
    box-shadow: 0 10px 30px rgba(0,0,0,.5);
    position: relative;
    background: #22262b;
  }
  .face img {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 118%;
    height: 118%;
    object-fit: cover;
  }
  .face.him { transform: rotate(-4deg); }
  .face.her { transform: rotate(4deg); }

  .amp {
    font-size: clamp(26px, 6vw, 40px);
    font-style: italic;
    color: #c9a24b;
  }

  .buttons {
    display: flex;
    gap: 16px;
  }

  button.answer {
    font-family: Georgia, serif;
    font-size: clamp(20px, 5vw, 26px);
    letter-spacing: 2px;
    padding: 16px 44px;
    border-radius: 999px;
    border: 2px solid #f4efe6;
    background: transparent;
    color: #f4efe6;
    cursor: pointer;
    transition: transform .12s ease, background .12s ease, color .12s ease;
  }
  button.answer:hover { background: #f4efe6; color: #101418; transform: translateY(-2px); }
  button.answer:active { transform: translateY(1px) scale(.97); }

  .footer {
    position: fixed;
    bottom: 12px;
    left: 0; right: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: #565c63;
    padding: 0 20px;
  }

  /* ---------- verdict overlay ---------- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(14, 16, 20, .96);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    z-index: 10;
  }
  .overlay.show { display: flex; animation: flashIn .35s ease; }

  @keyframes flashIn {
    0%   { background: rgba(178, 34, 34, .95); }
    100% { background: rgba(14, 16, 20, .96); }
  }

  .incorrect {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 800;
    font-size: clamp(40px, 11vw, 84px);
    letter-spacing: 4px;
    color: #e3484d;
    animation: shake .45s ease;
    margin-bottom: 10px;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px) rotate(-2deg); }
    40% { transform: translateX(11px) rotate(2deg); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(6px); }
  }

  .verdict-sub {
    font-size: clamp(17px, 4.5vw, 24px);
    font-style: italic;
    color: #cfc8bb;
    max-width: 480px;
    margin-bottom: 26px;
    min-height: 2.4em;
  }

  .pals {
    font-size: clamp(52px, 15vw, 120px);
    color: #c9a24b;
    line-height: 1;
    margin-bottom: 34px;
    animation: stamp .4s cubic-bezier(.2, 2.2, .4, 1) .25s both;
  }
  @keyframes stamp {
    0% { transform: scale(2.4) rotate(-14deg); opacity: 0; }
    100% { transform: scale(1) rotate(-4deg); opacity: 1; }
  }

  .again {
    font-family: Georgia, serif;
    font-size: 17px;
    padding: 12px 30px;
    border-radius: 999px;
    border: 1.5px solid #8b9199;
    background: transparent;
    color: #cfc8bb;
    cursor: pointer;
  }
  .again:hover { border-color: #f4efe6; color: #f4efe6; }

  .confetti {
    position: fixed;
    top: -6vh;
    font-size: 22px;
    pointer-events: none;
    z-index: 11;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(115vh) rotate(720deg); }
  }
</style>
</head>
<body>

  <div class="kicker">Official Friendship Assessment · Question 1 of 1</div>
  <h1>Are these two people friends?</h1>

  <div class="faces">
    <div class="face him"><img src="him.png" alt="Exhibit A"></div>
    <div class="amp">&amp;</div>
    <div class="face her"><img src="her.png" alt="Exhibit B"></div>
  </div>

  <div class="buttons">
    <button class="answer" onclick="answer()">YES</button>
    <button class="answer" onclick="answer()">NO</button>
  </div>

  <div class="footer">CERTIFIED BY THE GOLBORNE INSTITUTE FOR THE STUDY OF PALS · TO DATE, 100% OF RESPONDENTS HAVE ANSWERED INCORRECTLY</div>

  <div class="overlay" id="overlay">
    <div class="incorrect" id="incorrect">INCORRECT</div>
    <div class="verdict-sub" id="sub"></div>
    <div class="pals">THEY ARE<br>PALS 🍻</div>
    <button class="again" onclick="reset()">appeal the verdict</button>
  </div>

<script>
  let attempts = 0;

  const lines = [
    "It was a trick question. Friendship doesn't cover it.",
    "Wrong again. Still pals.",
    "You keep pressing buttons. They keep being pals.",
    "There is no correct button. The answer is pals.",
    "It has always been pals. It will always be pals.",
    "Stop it. Pals. Forever. Case closed."
  ];

  function buzzer() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = "sawtooth";
      o.frequency.value = 110;
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.55);
      o.connect(g).connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + 0.55);
    } catch (e) {}
  }

  function confetti() {
    const bits = ["🍻", "🍷", "🥂", "PALS", "🍺"];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement("div");
      el.className = "confetti";
      el.textContent = bits[i % bits.length];
      el.style.left = (i * 2.5) % 100 + "vw";
      el.style.animationDuration = 2.4 + (i % 7) * 0.35 + "s";
      el.style.animationDelay = (i % 10) * 0.12 + "s";
      if (el.textContent === "PALS") {
        el.style.color = "#c9a24b";
        el.style.fontFamily = "Georgia, serif";
        el.style.fontStyle = "italic";
      }
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 7000);
    }
  }

  function answer() {
    attempts++;
    buzzer();
    document.getElementById("sub").textContent = lines[Math.min(attempts - 1, lines.length - 1)];
    const ov = document.getElementById("overlay");
    ov.classList.remove("show");
    void ov.offsetWidth;
    ov.classList.add("show");
    confetti();
  }

  function reset() {
    document.getElementById("overlay").classList.remove("show");
  }
</script>
</body>
</html>
